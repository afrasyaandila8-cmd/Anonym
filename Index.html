<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Star ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* TEMA PREMIUM PINK & CREAM */
        body { background-color: #fff5f7; font-family: 'Poppins', sans-serif; margin: 0; color: #444; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 400px; min-height: 100vh; position: relative; padding-bottom: 80px; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        /* HEADER */
        .header { background: #ff9fb2; padding: 25px 20px; color: white; border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; display: flex; justify-content: space-between; align-items: center; }
        .stats { display: flex; gap: 10px; font-weight: bold; }
        .stat-item { background: rgba(255,255,255,0.25); padding: 6px 12px; border-radius: 15px; font-size: 13px; display: flex; align-items: center; gap: 5px; }

        /* NAVIGATION & MENU */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; padding: 0 20px; }
        .menu-box { background: #fffcfd; border: 2px solid #ffccd5; padding: 20px; border-radius: 25px; text-align: center; font-weight: bold; cursor: pointer; color: #ff859d; transition: 0.3s; }
        .menu-box:active { transform: scale(0.95); background: #fff0f3; }

        /* SCREENS */
        .screen { padding: 25px 20px; display: none; }
        .active-screen { display: block; }

        /* QUIZ MODAL */
        .modal-quiz { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .btn-opsi { background: #fff; border: 2px solid #ffccd5; padding: 15px; width: 100%; border-radius: 15px; margin-bottom: 10px; cursor: pointer; font-size: 16px; color: #555; font-family: 'Poppins'; }
        
        input { padding: 15px; width: 80%; border-radius: 15px; border: 2px solid #ffccd5; outline: none; margin-bottom: 20px; text-align: center; }
        .btn-pink { background: #ff9fb2; color: white; border: none; padding: 15px 50px; border-radius: 30px; font-weight: bold; cursor: pointer; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 400px; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; }
        .nav-item { color: #ccc; font-size: 12px; cursor: pointer; text-align: center; }
        .nav-active { color: #ff9fb2; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="scr-login" class="screen active-screen" style="text-align: center;">
        <h1 style="color:#ff9fb2; margin-top:80px;">English Star ✨</h1>
        <p style="font-size: 14px; color: #888;">Belajar bahasa Inggris dengan asyik!</p>
        <input type="text" id="inputNama" placeholder="Ketik namamu...">
        <br>
        <button class="btn-pink" onclick="showLevel()">Mulai Belajar</button>
    </div>

    <div id="scr-level" class="screen">
        <h3 style="color:#ff9fb2; text-align:center">Pilih Level Kamu 🌸</h3>
        <div id="level-list">
            <button onclick="finishLogin('A1')" class="btn-opsi" style="text-align:left;">
                <b style="color:#ff859d">A1 - Beginner</b><br><small>Dasar & Kosakata Harian</small>
            </button>
            <button onclick="finishLogin('A2')" class="btn-opsi" style="text-align:left;">
                <b style="color:#ff859d">A2 - Elementary</b><br><small>Percakapan Sederhana</small>
            </button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <div class="header">
            <div>
                <div id="displayNama" style="font-weight:bold; font-size:18px">Halo!</div>
                <div id="displayLevel" style="font-size:11px; background:rgba(255,255,255,0.3); padding:3px 8px; border-radius:8px;">A1 Member</div>
            </div>
            <div class="stats">
                <div class="stat-item">❤️ <span id="valHati">5</span></div>
                <div class="stat-item">⭐ <span id="valBintang">0</span></div>
            </div>
        </div>

        <div id="tab-home" class="screen active-screen">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h4>Latihan Hari Ini</h4>
                <select id="selectDay" onchange="changeDay()" style="border: 1px solid #ffccd5; border-radius: 10px; color: #ff859d;">
                    <option value="1">Day 1</option>
                    <option value="2">Day 2</option>
                    </select>
            </div>
            <div class="menu-grid">
                <div class="menu-box" onclick="mulaiKuis('Writing')">📝<br><small>Writing</small></div>
                <div class="menu-box" onclick="mulaiKuis('Listening')">🎧<br><small>Listening</small></div>
                <div class="menu-box" onclick="mulaiKuis('Grammar')">📖<br><small>Grammar</small></div>
                <div class="menu-box" onclick="mulaiKuis('Reading')">🔤<br><small>Reading</small></div>
            </div>
        </div>

        <div id="tab-materi" class="screen">
            <h4 style="text-align:left;">Materi Belajar</h4>
            <div id="list-materi">
                </div>
        </div>

        <div id="tab-vocab" class="screen">
            <h4 style="text-align:left;">Kamus Kecil</h4>
            <div id="list-vocab">
                </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item nav-active" onclick="switchTab('home', this)">🏠<br>Home</div>
            <div class="nav-item" onclick="switchTab('materi', this)">📚<br>Materi</div>
            <div class="nav-item" onclick="switchTab('vocab', this)">🔤<br>Vocab</div>
        </div>
    </div>
</div>

<div id="quiz-screen" class="modal-quiz">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <button onclick="tutupKuis()" style="border:none; background:none; font-size:24px; color:#ff9fb2">✕</button>
        <b id="judulKuis">Latihan</b>
        <div style="color:#ff9fb2; font-weight:bold">❤️ <span id="valHatiKuis">5</span></div>
    </div>
    <div id="areaSoal" style="margin-top:40px; text-align: center;">
        <div id="progress-bar" style="height:5px; background:#eee; width:100%; border-radius:10px; margin-bottom:20px;">
            <div id="progress-fill" style="height:100%; background:#ff9fb2; width:0%; transition:0.3s;"></div>
        </div>
        <h2 id="teksTanya" style="font-size: 20px; min-height: 60px;">Pertanyaan...</h2>
        <div id="areaOpsi" style="margin-top: 30px; display: flex; flex-direction: column;"></div>
    </div>
</div>

<script src="soal_a1_b2.js"></script>
<script src="materi_a1_b2.js"></script>
<script src="vocab_a1_b2.js"></script>

<script>
    let bintang = 0;
    let hati = 5;
    let currentDay = "Day1";
    let myName = "";
    let myLevel = "A1";
    let indexSoal = 0;
    let soalAktif = [];

    // Fungsi Navigasi Tab
    function switchTab(tabName, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        
        document.getElementById('tab-' + tabName).classList.add('active-screen');
        el.classList.add('nav-active');

        if(tabName === 'materi') loadMateri();
        if(tabName === 'vocab') loadVocab();
    }

    function showLevel() {
        myName = document.getElementById('inputNama').value;
        if(myName) {
            document.getElementById('scr-login').style.display = 'none';
            document.getElementById('scr-level').style.display = 'block';
        } else {
            alert("Masukkan namamu dulu ya ✨");
        }
    }

    function finishLogin(lvl) {
        myLevel = lvl;
        document.getElementById('scr-level').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('displayNama').innerText = "Halo, " + myName + "!";
        document.getElementById('displayLevel').innerText = lvl + " Member";
    }

    function changeDay() {
        currentDay = "Day" + document.getElementById('selectDay').value;
    }

    function mulaiKuis(tipe) {
        // Mengambil data dari variabel di file soal_a1_b2.js
        try {
            soalAktif = bankSoal[myLevel][currentDay][tipe];
            indexSoal = 0;
            document.getElementById('judulKuis').innerText = tipe + " - " + currentDay;
            document.getElementById('quiz-screen').style.display = 'flex';
            tampilkanSoal();
        } catch (e) {
            alert("Ups! Soal belum tersedia untuk " + currentDay + " level ini.");
        }
    }

    function tampilkanSoal() {
        let s = soalAktif[indexSoal];
        let progress = ((indexSoal) / soalAktif.length) * 100;
        document.getElementById('progress-fill').style.width = progress + "%";
        
        if(s.suara) {
            document.getElementById('teksTanya').innerHTML = 
                `<div onclick="putarSuara('${s.suara}')" style="cursor:pointer; color:#ff9fb2;">
                    ${s.tanya} <br><small style="font-size:12px; color:#aaa;">(Klik untuk dengar suara 🎧)</small>
                </div>`;
        } else {
            document.getElementById('teksTanya').innerText = s.tanya;
        }

        document.getElementById('areaOpsi').innerHTML = "";
        s.pilih.forEach(o => {
            let btn = document.createElement('button');
            btn.className = "btn-opsi";
            btn.innerText = o;
            btn.onclick = () => cekJawaban(o);
            document.getElementById('areaOpsi').appendChild(btn);
        });
    }

    function putarSuara(teks) {
        let msg = new SpeechSynthesisUtterance(teks);
        msg.lang = 'en-US';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function cekJawaban(jawaban) {
        let s = soalAktif[indexSoal];
        if(jawaban === s.benar) {
            bintang += 5;
            // Kamu bisa ganti alert dengan animasi CSS agar lebih "premium"
        } else {
            hati -= 1;
        }
        updateStats();
        indexSoal++;
        if(indexSoal < soalAktif.length && hati > 0) {
            tampilkanSoal();
        } else {
            alert("Latihan Selesai! ⭐ +" + (indexSoal * 5));
            tutupKuis();
        }
    }

    function tutupKuis() {
        document.getElementById('quiz-screen').style.display = 'none';
        updateStats();
    }

    function updateStats() {
        document.getElementById('valBintang').innerText = bintang;
        document.getElementById('valHati').innerText = hati;
        document.getElementById('valHatiKuis').innerText = hati;
        if(hati <= 0) {
            alert("Yah, nyawamu habis! Istirahat dulu ya.");
            location.reload(); 
        }
    }

    // Fungsi load data materi (File 3)
    function loadMateri() {
        let html = "";
        dataMateri[myLevel].forEach(m => {
            html += `<div style="background:#fffcfd; border:2px solid #ffccd5; padding:15px; border-radius:15px; margin-bottom:10px; text-align:left">
                        <b style="color:#ff859d">${m.judul}</b><br><small>${m.isi}</small>
                     </div>`;
        });
        document.getElementById('list-materi').innerHTML = html;
    }

    // Fungsi load data vocab (File 4)
    function loadVocab() {
        let html = "<table style='width:100%; border-collapse:collapse;'>";
        dataVocab[myLevel].forEach(v => {
            html += `<tr style='border-bottom:1px solid #ffccd5;'>
                        <td style='padding:10px; color:#ff859d'><b>${v.en}</b></td>
                        <td style='padding:10px; color:#888'>${v.id}</td>
                        <td style='cursor:pointer' onclick="putarSuara('${v.en}')">🔊</td>
                     </tr>`;
        });
        html += "</table>";
        document.getElementById('list-vocab').innerHTML = html;
    }
</script>
</body>
</html>
